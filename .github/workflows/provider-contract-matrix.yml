name: Provider Contract Matrix

on:
  pull_request:
    paths:
      - "Dochi/Services/NativeLLM/**"
      - "DochiTests/ProviderContractMatrixTests.swift"
      - "DochiTests/Fixtures/ProviderContract/**"
      - ".github/workflows/provider-contract-matrix.yml"
  push:
    branches:
      - main
    paths:
      - "Dochi/Services/NativeLLM/**"
      - "DochiTests/ProviderContractMatrixTests.swift"
      - "DochiTests/Fixtures/ProviderContract/**"
      - ".github/workflows/provider-contract-matrix.yml"

jobs:
  provider-contract:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Supabase Config Placeholder
        run: |
          if [[ ! -f Dochi/Resources/SupabaseConfig.plist ]]; then
            mkdir -p Dochi/Resources
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict/>' \
              '</plist>' > Dochi/Resources/SupabaseConfig.plist
          fi

      - name: Run Provider Contract Smoke
        run: |
          xcodebuild test \
            -project Dochi.xcodeproj \
            -scheme Dochi \
            -destination 'platform=macOS' \
            -only-testing:DochiTests/AnthropicProviderContractTests/testTextScenario \
            -only-testing:DochiTests/OpenAIProviderContractTests/testTextScenario \
            -only-testing:DochiTests/ZAIProviderContractTests/testTextScenario \
            -only-testing:DochiTests/OllamaProviderContractTests/testTextScenario \
            -only-testing:DochiTests/LMStudioProviderContractTests/testTextScenario \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
