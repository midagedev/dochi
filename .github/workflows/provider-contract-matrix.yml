name: Provider Contract Matrix

on:
  pull_request:
    paths:
      - "Dochi/Services/NativeLLM/**"
      - "DochiTests/**"
      - "scripts/provider_contract_matrix.sh"
      - ".github/workflows/provider-contract-matrix.yml"
  push:
    branches:
      - main
    paths:
      - "Dochi/Services/NativeLLM/**"
      - "DochiTests/**"
      - "scripts/provider_contract_matrix.sh"
      - ".github/workflows/provider-contract-matrix.yml"

jobs:
  provider-contract:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Supabase Config Placeholder
        run: |
          if [[ ! -f Dochi/Resources/SupabaseConfig.plist ]]; then
            mkdir -p Dochi/Resources
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict/>' \
              '</plist>' > Dochi/Resources/SupabaseConfig.plist
          fi

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Run Provider Contract Matrix
        run: bash scripts/provider_contract_matrix.sh "$GITHUB_WORKSPACE/.artifacts/provider-contract-matrix"

      - name: Upload Provider Contract Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-contract-matrix
          path: ${{ github.workspace }}/.artifacts/provider-contract-matrix
